# unified-support configuration
# Copy to config.yaml and fill in your credentials

channels:
  telegram:
    token: "${TELEGRAM_BOT_TOKEN}"
  webchat:
    port: 8082
    path: /ws
  whatsapp:
    mode: unofficial
    bridge_url: "http://localhost:8084"

ai:
  backend: minimax
  api_key: "${AI_API_KEY}"
  model: MiniMax-Text-01
  temperature: 0.3
  system_prompt: |
    You are a professional, friendly customer support agent.
    Answer based on knowledge base and customer info provided.
    Be concise, professional, and polite.

    IMPORTANT: Always reply in the SAME language the customer uses.

    When the customer asks about orders, shipping, or delivery:
    - If Customer Info is available, use it to answer directly
    - Order status: 0=Pending Payment, 1=Paid, 2=Processing, 3=Shipped, 4=Completed, 5=Cancelled
    - Never make up shipping info

    If you cannot answer confidently, offer to connect them with a human agent.

    SECURITY RULES for non-logged-in users:
    - If no Customer Info is provided, the user is NOT logged in
    - Do NOT reveal personal info to non-logged-in users
    - Ask them to log in for full order details

    {kb_context}

knowledge:
  path: ./knowledge
  reindex_on_start: true

topic_bridge:
  group_chat_id: -1001234567890         # Telegram forum group ID
  agent_ids: ["123456789", "987654321"] # Telegram user IDs of CS agents
  default_lang: zh
  reply_timeout: 180

erp:
  base_url: "${ERP_BASE_URL}"
  api_key: "${ERP_API_KEY}"

escalation:
  max_ai_turns: 8

rate_limit:
  max_messages: 30
  window_seconds: 60

agents:
  - id: agent1
    name: Agent Name
    channel: telegram
    chat_id: "123456789"
    skills: [general]

dashboard:
  port: 8081
  base_url: "http://localhost:8081"

database:
  path: ./data/support.db
