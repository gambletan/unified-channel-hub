<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Support Dashboard</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #333; }
.header { background: #1a1a2e; color: white; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; }
.header h1 { font-size: 18px; font-weight: 600; }
.stats { display: flex; gap: 24px; font-size: 13px; opacity: 0.8; }
.stats span { background: rgba(255,255,255,0.1); padding: 4px 12px; border-radius: 12px; }
.container { display: grid; grid-template-columns: 320px 1fr; height: calc(100vh - 56px); }
.ticket-list { background: white; border-right: 1px solid #e0e0e0; overflow-y: auto; }
.ticket-item { padding: 12px 16px; border-bottom: 1px solid #f0f0f0; cursor: pointer; }
.ticket-item:nth-child(odd) { background: #f4f6fb; }
.ticket-item:nth-child(even) { background: #ffffff; }
.ticket-item:hover { background: #eceaff; }
.ticket-item.active { background: #e8e8ff; border-left: 3px solid #4a4aff; }
.ticket-item .channel { font-size: 11px; color: #888; text-transform: uppercase; }
.ticket-item .subject { font-size: 14px; margin: 4px 0; }
.ticket-item .meta { font-size: 11px; color: #999; display: flex; justify-content: space-between; }
.status-badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 600; }
.status-open { background: #e3f2fd; color: #1565c0; }
.status-escalated { background: #fff3e0; color: #e65100; }
.status-assigned { background: #f3e5f5; color: #7b1fa2; }
.status-resolved { background: #e8f5e9; color: #2e7d32; }
.chat-panel { display: flex; flex-direction: column; }
.messages { flex: 1; overflow-y: auto; padding: 16px; }
.msg { max-width: 70%; margin-bottom: 12px; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; }
.msg.customer { background: #e3f2fd; align-self: flex-start; border-bottom-left-radius: 4px; }
.msg.ai { background: #f5f5f5; align-self: flex-end; margin-left: auto; border-bottom-right-radius: 4px; }
.msg.agent { background: #e8f5e9; align-self: flex-end; margin-left: auto; border-bottom-right-radius: 4px; }
.msg .role { font-size: 11px; color: #888; margin-bottom: 4px; }
.reply-bar { padding: 12px 16px; border-top: 1px solid #e0e0e0; display: flex; gap: 8px; background: white; }
.reply-bar input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
.reply-bar button { padding: 10px 20px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }
.btn-send { background: #4a4aff; color: white; }
.btn-resolve { background: #2e7d32; color: white; }
.empty { display: flex; align-items: center; justify-content: center; height: 100%; color: #999; font-size: 16px; }
.messages { display: flex; flex-direction: column; }
.filters { padding: 8px 12px; background: #fafafa; border-bottom: 1px solid #eee; display: flex; gap: 6px; }
.filters button { padding: 4px 10px; border: 1px solid #ddd; border-radius: 12px; background: white; font-size: 12px; cursor: pointer; }
.filters button.active { background: #4a4aff; color: white; border-color: #4a4aff; }
</style>
</head>
<body>
<div class="header">
  <h1>Support Dashboard</h1>
  <div class="stats">
    <span id="stat-open">Open: -</span>
    <span id="stat-escalated">Escalated: -</span>
    <span id="stat-resolved">Resolved: -</span>
    <span id="stat-csat">CSAT: -</span>
  </div>
</div>
<div class="container">
  <div class="ticket-list">
    <div class="filters">
      <button class="active" data-status="">All</button>
      <button data-status="open">Open</button>
      <button data-status="escalated">Escalated</button>
      <button data-status="assigned">Assigned</button>
      <button data-status="resolved">Resolved</button>
    </div>
    <div id="tickets"></div>
  </div>
  <div class="chat-panel">
    <div class="messages" id="messages">
      <div class="empty">Select a ticket to view conversation</div>
    </div>
    <div class="reply-bar" id="reply-bar" style="display:none">
      <input type="text" id="reply-input" placeholder="Type a reply...">
      <button class="btn-send" onclick="sendReply()">Send</button>
      <button class="btn-resolve" onclick="resolveTicket()">Resolve</button>
    </div>
  </div>
</div>
<script>
let currentTicket = null;
let currentStatus = '';

async function loadTickets() {
  const url = currentStatus ? `/api/tickets?status=${currentStatus}` : '/api/tickets';
  const res = await fetch(url);
  const tickets = await res.json();
  const el = document.getElementById('tickets');
  el.innerHTML = tickets.map(t => `
    <div class="ticket-item ${currentTicket === t.id ? 'active' : ''}" onclick="selectTicket('${t.id}')">
      <div class="channel">${t.channel} <span class="status-badge status-${t.status}">${t.status}</span></div>
      <div class="subject">${t.subject || 'No subject'}</div>
      <div class="meta">
        <span>${t.customer_name || 'Unknown'}</span>
        <span>${new Date(t.created_at).toLocaleString()}</span>
      </div>
    </div>
  `).join('');
}

async function selectTicket(id) {
  currentTicket = id;
  loadTickets();
  const res = await fetch(`/api/tickets/${id}/messages`);
  const msgs = await res.json();
  const el = document.getElementById('messages');
  el.innerHTML = msgs.map(m => `
    <div class="msg ${m.role}">
      <div class="role">${m.role === 'customer' ? (m.sender_name || 'Customer') : m.role === 'ai' ? 'AI' : m.sender_name || 'Agent'} · ${new Date(m.created_at).toLocaleTimeString()}</div>
      ${m.content}
    </div>
  `).join('');
  el.scrollTop = el.scrollHeight;
  document.getElementById('reply-bar').style.display = 'flex';
}

async function sendReply() {
  const input = document.getElementById('reply-input');
  if (!input.value.trim() || !currentTicket) return;
  await fetch(`/api/tickets/${currentTicket}/reply`, {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({text: input.value})
  });
  input.value = '';
  selectTicket(currentTicket);
}

async function resolveTicket() {
  if (!currentTicket) return;
  await fetch(`/api/tickets/${currentTicket}/resolve`, {method: 'POST'});
  selectTicket(currentTicket);
  loadTickets();
}

async function loadAnalytics() {
  const res = await fetch('/api/analytics');
  const data = await res.json();
  document.getElementById('stat-open').textContent = `Open: ${data.tickets?.open || 0}`;
  document.getElementById('stat-escalated').textContent = `Escalated: ${data.tickets?.escalated || 0}`;
  document.getElementById('stat-resolved').textContent = `Resolved: ${data.tickets?.resolved || 0}`;
  document.getElementById('stat-csat').textContent = `CSAT: ${data.avg_csat || '-'}`;
}

// Filters
document.querySelectorAll('.filters button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentStatus = btn.dataset.status;
    loadTickets();
  });
});

// WebSocket for live updates
const ws = new WebSocket(`${location.protocol === 'https:' ? 'wss:' : 'ws:'}//${location.host}/ws`);
ws.onmessage = () => { loadTickets(); loadAnalytics(); if (currentTicket) selectTicket(currentTicket); };

// Enter to send
document.getElementById('reply-input').addEventListener('keydown', e => { if (e.key === 'Enter') sendReply(); });

loadTickets();
loadAnalytics();
setInterval(loadAnalytics, 30000);
</script>
</body>
</html>
