<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Support Chat</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; height: 100vh; display: flex; flex-direction: column; }

.header { background: #4a4aff; color: white; padding: 14px 20px; display: flex; justify-content: space-between; align-items: center; }
.header h3 { font-size: 16px; }
.header-info { display: flex; align-items: center; gap: 10px; }
.session-id { font-size: 11px; opacity: 0.7; font-family: monospace; }
.status { font-size: 12px; padding: 3px 10px; border-radius: 10px; background: rgba(255,255,255,0.2); }
.status.connected { background: #4caf50; }

.messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
.msg { max-width: 75%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; word-break: break-word; }
.msg.customer { align-self: flex-end; background: #4a4aff; color: white; border-bottom-right-radius: 4px; }
.msg.agent { align-self: flex-start; background: white; color: #333; border-bottom-left-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
.msg.system { align-self: center; background: #e8e8e8; color: #666; font-size: 12px; padding: 4px 12px; border-radius: 10px; }
.msg .time { font-size: 11px; opacity: 0.6; margin-top: 4px; }

.login-bar { background: #fff3cd; padding: 10px 16px; display: flex; align-items: center; gap: 10px; font-size: 13px; }
.login-bar input { flex: 1; padding: 6px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; }
.login-bar button { padding: 6px 14px; background: #ff9800; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }

.input-area { background: white; padding: 12px 16px; display: flex; gap: 10px; border-top: 1px solid #e0e0e0; }
.input-area input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 20px; font-size: 14px; outline: none; }
.input-area input:focus { border-color: #4a4aff; }
.input-area button { padding: 10px 20px; background: #4a4aff; color: white; border: none; border-radius: 20px; cursor: pointer; font-size: 14px; }
.input-area button:disabled { background: #ccc; }
</style>
</head>
<body>

<div class="header">
  <h3>Customer Support</h3>
  <div class="header-info">
    <span class="session-id" id="sessionDisplay"></span>
    <span class="status" id="status">Connecting...</span>
  </div>
</div>

<!-- Login bar (shown for guests) -->
<div class="login-bar" id="loginBar">
  <span>Guest</span>
  <input type="text" id="loginUid" placeholder="User ID">
  <input type="text" id="loginName" placeholder="Name (optional)">
  <button onclick="doLogin()">Login</button>
</div>

<div class="messages" id="messages"></div>

<div class="input-area">
  <input type="text" id="input" placeholder="Type a message..." onkeydown="if(event.key==='Enter')sendMsg()">
  <button onclick="sendMsg()" id="sendBtn" disabled>Send</button>
</div>

<script>
const WS_URL = 'ws://' + location.hostname + ':8082/ws'
let ws = null
let sessionId = null
let isAuthenticated = false

const params = new URLSearchParams(location.search)
const urlUserId = params.get('user_id')
const urlName = params.get('name')

function connect() {
  let url = WS_URL
  const qp = []

  if (urlUserId) {
    // Logged-in user: connect with user_id directly
    qp.push('user_id=' + encodeURIComponent(urlUserId))
    if (urlName) qp.push('name=' + encodeURIComponent(urlName))
    isAuthenticated = true
  } else {
    // Guest: restore previous session if available
    const saved = localStorage.getItem('cs_session')
    if (saved) qp.push('session_id=' + encodeURIComponent(saved))
  }

  if (qp.length) url += '?' + qp.join('&')
  ws = new WebSocket(url)

  ws.onopen = () => {
    document.getElementById('sendBtn').disabled = false
    setStatus('connected', 'Online')
  }

  ws.onmessage = (e) => {
    const data = JSON.parse(e.data)

    if (data.type === 'system') {
      // Save session ID
      if (data.session_id) {
        sessionId = data.session_id
        localStorage.setItem('cs_session', sessionId)
        updateSessionDisplay()
      }
      // Auth confirmed
      if (data.text === 'authenticated') {
        isAuthenticated = true
        document.getElementById('loginBar').style.display = 'none'
        addMessage('system', 'Logged in successfully')
        updateSessionDisplay()
        return
      }
      if (data.user_type === 'authenticated') {
        isAuthenticated = true
        document.getElementById('loginBar').style.display = 'none'
      }
      addMessage('system', data.text)
    } else if (data.type === 'text') {
      addMessage('agent', data.text)
    }
  }

  ws.onclose = () => {
    document.getElementById('sendBtn').disabled = true
    setStatus('', 'Offline')
    addMessage('system', 'Disconnected. Reconnecting in 3s...')
    setTimeout(connect, 3000)
  }

  ws.onerror = () => setStatus('', 'Error')
}

function sendMsg() {
  const input = document.getElementById('input')
  const text = input.value.trim()
  if (!text || !ws || ws.readyState !== 1) return

  ws.send(JSON.stringify({ type: 'text', text: text }))
  addMessage('customer', text)
  input.value = ''
}

function doLogin() {
  const uid = document.getElementById('loginUid').value.trim()
  if (!uid) return alert('Please enter User ID')
  const name = document.getElementById('loginName').value.trim()

  if (ws && ws.readyState === 1) {
    addMessage('system', 'Logging in... (session: ' + sessionId + ' -> user: ' + uid + ')')
    const msg = { type: 'auth', user_id: uid }
    if (name) msg.name = name
    ws.send(JSON.stringify(msg))
  }
}

function addMessage(type, text) {
  const div = document.getElementById('messages')
  const msg = document.createElement('div')
  msg.className = 'msg ' + type
  const time = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' })
  msg.innerHTML = text + '<div class="time">' + time + '</div>'
  div.appendChild(msg)
  div.scrollTop = div.scrollHeight
}

function setStatus(cls, text) {
  const el = document.getElementById('status')
  el.className = 'status ' + cls
  el.textContent = text
}

function updateSessionDisplay() {
  const el = document.getElementById('sessionDisplay')
  if (isAuthenticated && urlUserId) {
    el.textContent = 'uid:' + urlUserId
  } else if (sessionId) {
    el.textContent = sessionId.substring(0, 12) + '...'
  }
}

// Hide login bar if already authenticated via URL
if (urlUserId) {
  document.getElementById('loginBar').style.display = 'none'
}

connect()
</script>
</body>
</html>
