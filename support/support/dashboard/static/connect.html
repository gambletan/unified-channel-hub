<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>联系客服 | Contact Support</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.card { background: white; border-radius: 20px; padding: 40px 32px; max-width: 480px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.3); text-align: center; }
h1 { font-size: 24px; margin-bottom: 8px; }
.subtitle { color: #666; margin-bottom: 24px; font-size: 14px; }
.qr-section { margin-bottom: 24px; }
.qr-section canvas { border: 3px solid #eee; border-radius: 12px; padding: 8px; }
.qr-label { font-size: 12px; color: #999; margin-top: 8px; }
.channels { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
.ch-btn { display: flex; align-items: center; gap: 10px; padding: 14px 16px; border: 2px solid #eee; border-radius: 12px; text-decoration: none; color: #333; font-size: 14px; font-weight: 500; transition: all 0.2s; cursor: pointer; }
.ch-btn:hover { border-color: #667eea; background: #f8f8ff; transform: translateY(-2px); }
.ch-btn .icon { font-size: 24px; }
.ch-btn.telegram { border-color: #0088cc; }
.ch-btn.whatsapp { border-color: #25d366; }
.ch-btn.line { border-color: #00b900; }
.ch-btn.webchat { border-color: #333; grid-column: span 2; justify-content: center; }
.ch-btn.active { border-color: #667eea; background: #f0f0ff; box-shadow: 0 0 0 3px rgba(102,126,234,0.2); }
.footer { font-size: 12px; color: #999; margin-top: 16px; }
.uid-badge { display: inline-block; background: #f0f0ff; color: #667eea; padding: 4px 12px; border-radius: 20px; font-size: 12px; margin-bottom: 16px; font-family: monospace; }
.no-uid { color: #999; font-size: 13px; margin-bottom: 16px; }
</style>
</head>
<body>
<div class="card">
  <h1>👋 需要帮助？</h1>
  <p class="subtitle">扫码联系客服，自动跳转您的聊天工具<br>Scan to connect — auto-detects your app</p>

  <div id="uid-display"></div>

  <div class="qr-section" id="qr-section" style="display:none">
    <canvas id="qr-canvas"></canvas>
    <p class="qr-label" id="qr-label"></p>
  </div>

  <div class="channels" id="channels">
    <p style="grid-column:span 2;color:#999">Loading channels...</p>
  </div>

  <p class="footer">无需下载 APP · 扫码即聊 · Scan & Chat</p>
</div>

<!-- QR Code generator (lightweight, no dependencies) -->
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>
<script>
const params = new URLSearchParams(location.search);
const uid = params.get('uid');

async function init() {
  // Show UID badge
  const uidEl = document.getElementById('uid-display');
  if (uid) {
    uidEl.innerHTML = `<span class="uid-badge">User: ${uid}</span>`;
  } else {
    uidEl.innerHTML = `<p class="no-uid">游客模式 · Guest mode</p>`;
  }

  // Fetch channel config
  let channels = [];
  try {
    if (uid) {
      const res = await fetch(`/api/connect-links/${uid}`);
      if (res.ok) {
        const data = await res.json();
        channels = Object.entries(data.links).map(([type, info]) => ({
          type, name: info.name, icon: info.icon, url: info.url, class: type
        }));
      }
    } else {
      const res = await fetch('/api/connect-config');
      if (res.ok) {
        const data = await res.json();
        channels = data.channels || [];
      }
    }
  } catch (e) {
    console.warn('Failed to fetch config:', e);
  }

  if (!channels.length) {
    document.getElementById('channels').innerHTML = '<p style="grid-column:span 2;color:#999">No channels configured</p>';
    return;
  }

  // Show the universal QR code (this page's own URL — one QR for all channels)
  const universalUrl = location.href;
  showQR(universalUrl, '任意聊天工具 / Any App');

  // Render channel buttons below as direct links
  const el = document.getElementById('channels');
  el.innerHTML = channels.map(c => `
    <a href="${c.url}" class="ch-btn ${c.class || ''}" target="_blank" rel="noopener">
      <span class="icon">${c.icon}</span>
      ${c.name}
    </a>
  `).join('');
}

function showQR(url, label) {
  const section = document.getElementById('qr-section');
  const canvas = document.getElementById('qr-canvas');
  const labelEl = document.getElementById('qr-label');

  // Make URL absolute for QR scanning
  let fullUrl = url;
  if (url.startsWith('/')) {
    fullUrl = location.origin + url;
  }

  QRCode.toCanvas(canvas, fullUrl, {
    width: 220,
    margin: 2,
    color: { dark: '#333', light: '#fff' },
  }, (err) => {
    if (err) console.error('QR error:', err);
  });

  labelEl.textContent = `扫码联系客服 · Scan to connect`;
  section.style.display = 'block';
}

// Auto-detect platform — if opened inside an IM app, auto-redirect to that bot
function detectAndRedirect() {
  const ua = navigator.userAgent.toLowerCase();
  let targetType = null;
  if (ua.includes('micromessenger')) targetType = 'wechat';
  else if (ua.includes('telegram')) targetType = 'telegram';
  else if (ua.includes('line')) targetType = 'line';

  if (!targetType) return;

  // Fetch links and redirect to the matching channel
  const endpoint = uid ? `/api/connect-links/${uid}` : '/api/connect-config';
  fetch(endpoint).then(r => r.json()).then(data => {
    const links = uid ? data.links : {};
    const channels = uid ? null : data.channels;
    let url = null;
    if (links && links[targetType]) url = links[targetType].url;
    if (channels) {
      const ch = channels.find(c => c.type === targetType);
      if (ch) url = ch.url;
    }
    if (url && !url.startsWith('/')) {
      location.href = url;  // Redirect to the IM bot link
    }
  }).catch(() => {});
}

detectAndRedirect();
init();
</script>
</body>
</html>
