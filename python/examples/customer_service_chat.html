<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>在线客服</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f2f5; height: 100vh; display: flex; justify-content: center; align-items: center; }

  .chat-container {
    width: 420px; height: 680px; background: #fff; border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.12); display: flex; flex-direction: column; overflow: hidden;
  }

  .chat-header {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: #fff; padding: 16px 20px; display: flex; align-items: center; gap: 12px;
  }
  .chat-header .header-text { flex: 1; }
  .chat-header h2 { font-size: 18px; font-weight: 600; }
  .chat-header p { font-size: 13px; opacity: 0.85; margin-top: 2px; }
  .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
  .status-dot.online { background: #4ade80; }
  .status-dot.offline { background: #f87171; }
  .user-badge {
    background: rgba(255,255,255,0.2); padding: 4px 10px; border-radius: 12px; font-size: 12px;
  }

  .messages {
    flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px;
  }
  .msg { max-width: 80%; padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.5; word-break: break-word; }
  .msg.user { align-self: flex-end; background: #667eea; color: #fff; border-bottom-right-radius: 4px; }
  .msg.agent { align-self: flex-start; background: #f0f0f0; color: #333; border-bottom-left-radius: 4px; }
  .msg.system { align-self: center; background: none; color: #999; font-size: 12px; padding: 4px; }
  .msg.history-divider { align-self: center; background: #f0f0f0; color: #999; font-size: 11px; padding: 4px 12px; border-radius: 10px; }
  .msg img, .msg video { max-width: 100%; border-radius: 8px; margin-top: 4px; cursor: pointer; }
  .msg .time { font-size: 11px; opacity: 0.6; margin-top: 4px; }

  .typing-indicator { align-self: flex-start; color: #999; font-size: 13px; padding: 4px 14px; display: none; }
  .typing-indicator.visible { display: block; }
  .typing-indicator span { animation: blink 1.4s infinite; }
  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100% { opacity: 0; } 40% { opacity: 1; } }

  .rating-bar { display: flex; gap: 4px; margin-top: 6px; flex-wrap: wrap; }
  .rating-bar button {
    padding: 6px 12px; border: 1px solid #ddd; border-radius: 16px; background: #fff;
    cursor: pointer; font-size: 12px; transition: all 0.2s;
  }
  .rating-bar button:hover { background: #667eea; color: #fff; border-color: #667eea; }

  .input-area {
    padding: 12px 16px; border-top: 1px solid #eee; display: flex; gap: 8px; align-items: flex-end;
  }
  .input-area textarea {
    flex: 1; border: 1px solid #ddd; border-radius: 20px; padding: 10px 16px;
    font-size: 14px; resize: none; outline: none; max-height: 100px; font-family: inherit;
  }
  .input-area textarea:focus { border-color: #667eea; }
  .input-area button {
    width: 40px; height: 40px; border-radius: 50%; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .btn-send { background: #667eea; color: #fff; }
  .btn-send:hover { background: #5a6fd6; }
  .btn-send:disabled { background: #ccc; cursor: not-allowed; }
  .btn-media { background: #f0f0f0; color: #666; }
  .btn-media:hover { background: #e0e0e0; }
  .btn-media input { display: none; }

  @media (max-width: 460px) {
    .chat-container { width: 100%; height: 100vh; border-radius: 0; }
  }
</style>
</head>
<body>

<div class="chat-container">
  <div class="chat-header">
    <div class="header-text">
      <h2><span class="status-dot" id="statusDot"></span>在线客服</h2>
      <p id="headerSub">有任何问题，随时输入消息</p>
    </div>
    <span class="user-badge" id="userBadge" style="display:none"></span>
  </div>

  <div class="messages" id="messages">
    <div class="msg system">正在连接...</div>
  </div>

  <div class="typing-indicator" id="typingIndicator">
    客服正在输入<span>.</span><span>.</span><span>.</span>
  </div>

  <div class="input-area">
    <button class="btn-media" title="发送图片">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
      <input type="file" id="fileInput" accept="image/*,video/*" />
    </button>
    <textarea id="input" placeholder="输入消息..." rows="1"></textarea>
    <button class="btn-send" id="sendBtn" disabled title="发送">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
/**
 * User identity — three ways to provide:
 * 1. URL params:   /chat?user_id=C10086&name=张三&phone=138xxx
 * 2. JS API:       window.CHAT_USER = { user_id: "C10086", name: "张三" }
 * 3. postMessage:  parent.postMessage({ type: "chat_user", ... }, "*")
 */

const urlParams = new URLSearchParams(location.search);
let chatUser = window.CHAT_USER || null;

if (!chatUser && urlParams.get('user_id')) {
  chatUser = {
    user_id: urlParams.get('user_id'),
    name: urlParams.get('name') || urlParams.get('user_id'),
    phone: urlParams.get('phone') || null,
  };
}

window.addEventListener('message', (e) => {
  if (e.data && e.data.type === 'chat_user') {
    chatUser = { user_id: e.data.user_id, name: e.data.name || e.data.user_id, phone: e.data.phone || null, extra: e.data.extra || {} };
    if (ws && ws.readyState === 1) {
      ws.send(JSON.stringify({ type: 'auth', ...chatUser }));
    }
    updateUserBadge();
  }
});

function buildWsUrl() {
  const base = `ws://${location.host}/ws`;
  if (chatUser && chatUser.user_id) {
    const params = new URLSearchParams();
    params.set('user_id', chatUser.user_id);
    if (chatUser.name) params.set('name', chatUser.name);
    if (chatUser.phone) params.set('phone', chatUser.phone);
    return `${base}?${params.toString()}`;
  }
  return base;
}

// --- UI ---
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const fileInput = document.getElementById('fileInput');
const statusDot = document.getElementById('statusDot');
const userBadge = document.getElementById('userBadge');
const headerSub = document.getElementById('headerSub');
const typingIndicator = document.getElementById('typingIndicator');

let ws = null;
let sessionId = null;
let typingTimeout = null;

function updateUserBadge() {
  if (chatUser && chatUser.user_id) {
    userBadge.textContent = chatUser.name || chatUser.user_id;
    userBadge.style.display = '';
    headerSub.textContent = `客户ID: ${chatUser.user_id}`;
  } else {
    userBadge.style.display = 'none';
    headerSub.textContent = '有任何问题，随时输入消息';
  }
}

function connect() {
  ws = new WebSocket(buildWsUrl());

  ws.onopen = () => {
    statusDot.className = 'status-dot online';
    sendBtn.disabled = false;
  };

  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);

    if (data.type === 'system') {
      if (data.session_id) sessionId = data.session_id;
      if (data.text === 'connected') {
        const label = data.user_type === 'authenticated' ? '已连接（已登录）' : '已连接，请输入您的问题';
        addMessage('system', label);
      } else if (data.text === 'authenticated') {
        addMessage('system', '身份已验证');
      }
      return;
    }

    // History messages (on reconnect)
    if (data.type === 'history') {
      renderHistory(data.messages || []);
      return;
    }

    // Typing indicator
    if (data.type === 'typing') {
      showTyping();
      return;
    }

    // Rating buttons
    if (data.type === 'text' && data.buttons) {
      hideTyping();
      addMessageWithButtons(data.text, data.buttons);
      return;
    }

    hideTyping();

    if (data.type === 'media' && data.url) {
      addMessage('agent', data.text || '', data.url, null, data.media_type);
    } else {
      addMessage('agent', data.text);
    }
  };

  ws.onclose = () => {
    statusDot.className = 'status-dot offline';
    sendBtn.disabled = true;
    addMessage('system', '连接断开，正在重连...');
    setTimeout(connect, 3000);
  };

  ws.onerror = () => { ws.close(); };
}

// --- History rendering ---
function renderHistory(messages) {
  if (messages.length === 0) return;

  // Add divider
  const divider = document.createElement('div');
  divider.className = 'msg history-divider';
  divider.textContent = `--- 以下是历史消息 (${messages.length}条) ---`;
  messagesEl.appendChild(divider);

  messages.forEach(m => {
    const role = m.sender === 'user' ? 'user' : 'agent';
    addMessage(role, m.text, m.media_url, m.timestamp, m.media_type);
  });

  const divider2 = document.createElement('div');
  divider2.className = 'msg history-divider';
  divider2.textContent = '--- 以上是历史消息 ---';
  messagesEl.appendChild(divider2);

  messagesEl.scrollTop = messagesEl.scrollHeight;
}

// --- Typing indicator ---
function showTyping() {
  typingIndicator.classList.add('visible');
  messagesEl.scrollTop = messagesEl.scrollHeight;
  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(hideTyping, 5000);
}

function hideTyping() {
  typingIndicator.classList.remove('visible');
  clearTimeout(typingTimeout);
}

// --- Rating buttons ---
function addMessageWithButtons(text, buttons) {
  const div = document.createElement('div');
  div.className = 'msg agent';

  let html = `<div>${escapeHtml(text)}</div>`;
  html += '<div class="rating-bar">';
  buttons.flat().forEach(btn => {
    html += `<button onclick="sendCallback('${escapeHtml(btn.callback_data)}')">${escapeHtml(btn.label)}</button>`;
  });
  html += '</div>';

  div.innerHTML = html;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function sendCallback(data) {
  if (!ws || ws.readyState !== 1) return;
  ws.send(JSON.stringify({ type: 'callback', callback_data: data }));
  // Disable all rating buttons
  document.querySelectorAll('.rating-bar button').forEach(b => { b.disabled = true; b.style.opacity = '0.5'; });
}

function addMessage(role, text, mediaUrl, timestamp, mediaType) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  let html = '';
  if (mediaUrl) {
    // Detect video by explicit media_type, data URI mime type, or file extension
    const isVideo = mediaType === 'video' || mediaUrl.match(/^data:video\//) || mediaUrl.match(/\.(mp4|webm|mov|avi)(\?|$)/i);
    if (isVideo) {
      html += `<video src="${mediaUrl}" controls playsinline style="max-width:100%;border-radius:8px;margin-top:4px;"></video>`;
    } else {
      html += `<img src="${mediaUrl}" onclick="window.open(this.src)" />`;
    }
  }
  if (text) {
    html += `<div>${escapeHtml(text)}</div>`;
  }

  const t = timestamp ? new Date(timestamp) : new Date();
  html += `<div class="time">${t.getHours().toString().padStart(2,'0')}:${t.getMinutes().toString().padStart(2,'0')}</div>`;

  div.innerHTML = html;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function sendText() {
  const text = inputEl.value.trim();
  if (!text || !ws || ws.readyState !== 1) return;

  ws.send(JSON.stringify({ type: 'text', text }));
  addMessage('user', text);
  inputEl.value = '';
  autoResize();
}

function sendMedia(file) {
  if (!ws || ws.readyState !== 1) return;

  const reader = new FileReader();
  reader.onload = () => {
    const dataUrl = reader.result;
    ws.send(JSON.stringify({
      type: 'media',
      media_type: file.type.startsWith('video') ? 'video' : 'image',
      data: dataUrl,
      text: '',
    }));
    addMessage('user', '', dataUrl);
  };
  reader.readAsDataURL(file);
}

function autoResize() {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + 'px';
}

// Events
sendBtn.addEventListener('click', sendText);
inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendText(); }
});
inputEl.addEventListener('input', autoResize);

document.querySelector('.btn-media').addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', () => {
  if (fileInput.files[0]) { sendMedia(fileInput.files[0]); fileInput.value = ''; }
});

updateUserBadge();
connect();
</script>
</body>
</html>
